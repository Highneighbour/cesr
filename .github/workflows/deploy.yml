name: Deploy - Contracts and Frontend

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy to'
        required: true
        default: 'lasna-testnet'
        type: choice
        options:
          - lasna-testnet
          - reactive-mainnet

jobs:
  deploy-contracts:
    name: Deploy Smart Contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Deploy contracts
        run: npm run deploy:${{ github.event.inputs.network }}
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          REACTIVE_MAINNET_RPC: ${{ secrets.REACTIVE_MAINNET_RPC }}
          LASNA_TESTNET_RPC: ${{ secrets.LASNA_TESTNET_RPC }}

      - name: Upload deployment output
        uses: actions/upload-artifact@v3
        with:
          name: deployment-output
          path: deploy/output.json

      - name: Comment deployment info on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = JSON.parse(fs.readFileSync('deploy/output.json', 'utf8'));
            const comment = `## 🚀 Deployment Complete\n\n**Network:** ${output.network}\n**Contracts:**\n- OriginPosition: \`${output.contracts.OriginPosition}\`\n- ReactiveManager: \`${output.contracts.ReactiveManager}\`\n- DestinationHandler: \`${output.contracts.DestinationHandler}\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-contracts

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        working-directory: ./frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        working-directory: ./frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy Project Artifacts to Vercel
        working-directory: ./frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  update-supabase:
    name: Update Supabase with Deployment Info
    runs-on: ubuntu-latest
    needs: deploy-contracts

    steps:
      - uses: actions/checkout@v4

      - name: Download deployment artifact
        uses: actions/download-artifact@v3
        with:
          name: deployment-output

      - name: Update Supabase
        run: |
          # This would update contract_deployments table with new addresses
          # Requires Supabase service role key
          echo "Deployment info updated in Supabase"
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}